name: determinism-gate

# Story 1.10a (FR-47 / AR-47) — run the Tier-1 golden-checksum replay harness HEADLESS on every push and
# FAIL the build on ANY checksum diff against a committed *.golden.txt. This is the determinism regression
# guard that protects Story 1.9's hard-won LAN-green from silently breaking.
#
# The Tier-1 test project (ProjectChimera.Sim.Tests) is Godot-free (Microsoft.NET.Sdk, compiles the pure-sim
# source directly), so this lane installs ONLY the .NET 8 SDK — no Godot, no editor, no GodotSharp (AR-2/AR-35).
#
# DO NOT, in this workflow:
#   - set CHIMERA_GOLDEN_RECORD (it flips the harness into re-baseline mode → the gate would prove nothing)
#   - target godot.sln / godot.csproj, or install Godot/GodotSharp (defeats the Godot-free AOT intent)
#   - "fix" a red run by re-recording a golden (a red run is a real determinism regression — fix the code)
# Stories 1.10b (banned-API/AOT analyzers) and 1.10c (Windows<->Linux cross-platform diff) add SIBLING jobs
# to this same file; keep the job name (tier1-golden-gate) stable.

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

# Collapse the project's hourly [AutoSave] push bursts to a single in-flight run per ref.
concurrency:
  group: determinism-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tier1-golden-gate:
    # D3 — ship-primary platform; the four goldens were recorded on Windows. The Windows<->Linux parity
    # diff is Story 1.10c (AR-37), NOT here. A red run on a different OS would be a 1.10c finding.
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8 SDK (no Godot)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'   # matches the test project's net8.0 TFM (D6)

      - name: Restore (Godot-free Tier-1 test project only, locked package graph)
        run: dotnet restore godot/ProjectChimera.Sim.Tests/ProjectChimera.Sim.Tests.csproj --locked-mode

      - name: Golden-checksum determinism gate (fails on ANY checksum diff)
        # CHIMERA_GOLDEN_RECORD is intentionally NEVER set — verify mode asserts against the committed goldens.
        # No hardcoded test count: xUnit returns a non-zero exit code on ANY failure, which fails this step.
        run: dotnet test godot/ProjectChimera.Sim.Tests/ProjectChimera.Sim.Tests.csproj -c Release --no-restore --logger "trx;LogFileName=tier1.trx"

      - name: Upload test results (.trx)
        if: always()   # also upload when the gate FAILS — that is exactly when the .trx is worth inspecting
        uses: actions/upload-artifact@v4
        with:
          name: tier1-test-results
          path: '**/*.trx'
          if-no-files-found: ignore
